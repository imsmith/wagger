<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Wagger mascot: puppy in play bow, minimal line art -->
  <!-- Tokyo Night palette -->

  <!-- Body silhouette as a single clean path: play bow pose -->
  <!-- Head low-left, spine slopes up to raised hindquarters -->
  <path d="
    M 30 72
    C 28 72, 22 68, 20 60
    C 18 52, 22 44, 30 42
    C 34 40, 38 42, 40 44
    C 42 40, 46 38, 48 40
    L 50 46
    C 54 42, 62 36, 72 32
    C 82 28, 92 28, 96 32
    C 100 36, 100 40, 98 44
    L 96 72
    C 96 76, 92 78, 88 78
    L 86 78
    C 84 78, 82 76, 82 72
    L 83 60
    L 76 72
    C 76 76, 72 78, 68 78
    L 66 78
    C 64 78, 62 76, 62 72
    L 64 58
    C 56 64, 48 68, 44 72
    C 44 76, 40 78, 36 78
    L 34 78
    C 32 78, 30 76, 30 72
    Z
  " fill="#7aa2f7"/>

  <!-- Front left leg -->
  <path d="M 38 68 L 36 90 C 36 93, 34 94, 32 94 L 30 94 C 28 94, 26 93, 26 90 L 26 88" fill="#5d7ec7" stroke="none"/>
  <!-- Front right leg -->
  <path d="M 46 66 L 44 90 C 44 93, 42 94, 40 94 L 38 94 C 36 94, 34 93, 34 90 L 34 88" fill="#7aa2f7" stroke="none"/>

  <!-- Hind left leg -->
  <path d="M 78 56 L 74 90 C 74 93, 72 94, 70 94 L 68 94 C 66 94, 64 93, 64 90 L 64 88" fill="#5d7ec7" stroke="none"/>
  <!-- Hind right leg -->
  <path d="M 88 50 L 90 90 C 90 93, 88 94, 86 94 L 84 94 C 82 94, 80 93, 80 90 L 80 88" fill="#7aa2f7" stroke="none"/>

  <!-- Paws -->
  <ellipse cx="30" cy="94" rx="6" ry="3.5" fill="#3d59a1"/>
  <ellipse cx="38" cy="94" rx="6" ry="3.5" fill="#3d59a1"/>
  <ellipse cx="68" cy="94" rx="6" ry="3.5" fill="#3d59a1"/>
  <ellipse cx="84" cy="94" rx="6" ry="3.5" fill="#3d59a1"/>

  <!-- Head -->
  <circle cx="26" cy="54" r="14" fill="#7aa2f7"/>

  <!-- Left ear (floppy) -->
  <path d="M 14 48 C 8 40, 6 30, 12 28 C 16 26, 20 32, 20 42" fill="#3d59a1"/>
  <!-- Right ear -->
  <path d="M 34 44 C 36 36, 38 28, 44 28 C 48 28, 46 36, 40 44" fill="#3d59a1"/>

  <!-- Inner ears -->
  <path d="M 14 44 C 10 38, 10 32, 14 30 C 16 29, 18 34, 18 42" fill="#bb9af7" opacity="0.45"/>
  <path d="M 36 42 C 38 36, 40 30, 43 30 C 45 30, 44 36, 40 42" fill="#bb9af7" opacity="0.45"/>

  <!-- Eyes -->
  <circle cx="20" cy="52" r="3.5" fill="#1a1b26"/>
  <circle cx="32" cy="51" r="3.5" fill="#1a1b26"/>
  <circle cx="21.2" cy="50.8" r="1.3" fill="white"/>
  <circle cx="33.2" cy="49.8" r="1.3" fill="white"/>

  <!-- Nose -->
  <ellipse cx="26" cy="60" rx="3" ry="2.2" fill="#1a1b26"/>
  <ellipse cx="25.2" cy="59.5" rx="1" ry="0.6" fill="white" opacity="0.35"/>

  <!-- Mouth + tongue -->
  <path d="M 23 62 Q 26 66, 29 62" stroke="#1a1b26" stroke-width="1.2" fill="none"/>
  <path d="M 25 63 Q 26 68, 27.5 63" fill="#f7768e"/>

  <!-- Chest patch -->
  <ellipse cx="42" cy="66" rx="6" ry="8" fill="#c0caf5" opacity="0.3"/>

  <!-- Tail (high, wagging arc) -->
  <path d="M 96 34 C 100 22, 108 16, 112 20" stroke="#7aa2f7" stroke-width="5" fill="none"/>
  <!-- Wag motion lines -->
  <path d="M 108 12 L 112 16" stroke="#bb9af7" stroke-width="2" opacity="0.5"/>
  <path d="M 114 14 L 116 20" stroke="#bb9af7" stroke-width="2" opacity="0.4"/>
  <path d="M 116 24 L 118 28" stroke="#bb9af7" stroke-width="2" opacity="0.3"/>
</svg>
